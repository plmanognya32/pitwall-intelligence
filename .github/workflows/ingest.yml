name: PitWall Data Ingestion

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cards-only


env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  ingest-and-embed:
    if: github.event.inputs.job != 'cards-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run F1 ingestion
        run: python ingestion/f1_ingest.py
      - name: Run MotoGP ingestion
        run: python ingestion/motogp_ingest.py
      - name: Run embedding
        run: python rag/embed.py

  generate-cards:
    if: always() && (github.event.inputs.job == 'cards-only' || needs.ingest-and-embed.result == 'success')
    needs: [ingest-and-embed]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Generate briefing cards
        run: python rag/generate_cards.py