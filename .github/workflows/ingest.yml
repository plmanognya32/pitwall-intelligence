name: PitWall Data Ingestion

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets present
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL is EMPTY"
          else
            echo "SUPABASE_URL is set (length: ${#SUPABASE_URL})"
          fi
          if [ -z "$SUPABASE_KEY" ]; then
            echo "SUPABASE_KEY is EMPTY"
          else
            echo "SUPABASE_KEY is set (length: ${#SUPABASE_KEY})"
          fi

      - name: Run F1 ingestion
        run: python ingestion/f1_ingest.py

      - name: Run MotoGP ingestion
        run: python ingestion/motogp_ingest.py

      - name: List available Gemini models
        continue-on-error: true
        run: python rag/list_models.py

      - name: Run embedding
        run: python rag/embed.py

      - name: Generate briefing cards
        run: python rag/generate_cards.py
